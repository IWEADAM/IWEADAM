<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IWEADAM</title>
  <link rel="stylesheet" href="style.css">
  <script src="index.js" defer></script>
</head>
<body>

<!-- ═══════════════ LOADER ═══════════════ -->
<div id="loader">
  <canvas id="stars-canvas"></canvas>
  <svg class="skyline" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMax meet">
    <polygon points="100,280 220,100 340,280" fill="none" stroke="#c8960c" stroke-width="1.5" opacity=".9"/>
    <polygon points="80,280 180,130 280,280" fill="none" stroke="#c8960c" stroke-width="1" opacity=".6"/>
    <polygon points="320,280 400,150 480,280" fill="none" stroke="#c8960c" stroke-width="1.2" opacity=".75"/>
    <rect x="490" y="240" width="90" height="40" rx="4" fill="none" stroke="#c8960c" stroke-width="1" opacity=".5"/>
    <ellipse cx="580" cy="235" rx="20" ry="25" fill="none" stroke="#c8960c" stroke-width="1" opacity=".5"/>
    <rect x="704" y="100" width="30" height="180" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity=".9"/>
    <rect x="792" y="110" width="35" height="170" fill="none" stroke="#00e5ff" stroke-width="1.2" opacity=".85"/>
    <rect x="860" y="90" width="28" height="190" fill="none" stroke="#00e5ff" stroke-width="1.3" opacity=".9"/>
    <rect x="930" y="60" width="12" height="220" fill="none" stroke="#ffd700" stroke-width="1.5" opacity=".9"/>
    <ellipse cx="936" cy="65" rx="18" ry="12" fill="none" stroke="#ffd700" stroke-width="1.5" opacity=".9"/>
    <rect x="920" y="200" width="32" height="80" fill="none" stroke="#ffd700" stroke-width="1" opacity=".7"/>
    <line id="scan-line" x1="0" y1="150" x2="1200" y2="150" stroke="#ffd700" stroke-width="1.5" opacity=".8"/>
  </svg>
  <div class="loader-content">
    <div class="eye-of-ra">
      <svg viewBox="0 0 100 60" width="80" height="48">
        <ellipse cx="50" cy="30" rx="40" ry="20" fill="none" stroke="#ffd700" stroke-width="1.5"/>
        <circle cx="50" cy="30" r="10" fill="none" stroke="#ffd700" stroke-width="1.5"/>
        <circle cx="50" cy="30" r="4" fill="#ffd700"/>
        <line x1="10" y1="30" x2="0" y2="40" stroke="#ffd700" stroke-width="1.2"/>
        <line x1="10" y1="30" x2="5" y2="50" stroke="#ffd700" stroke-width="1.2"/>
        <line x1="90" y1="30" x2="100" y2="20" stroke="#ffd700" stroke-width="1.2"/>
      </svg>
    </div>
    <h1 class="loader-name">IWEADAM</h1>
    <p class="loader-sub" id="loader-sub">INITIALIZING PROFILE...</p>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    <p class="loader-pct" id="loader-pct">0%</p>
  </div>
</div>

<!-- ═══════════════ MAIN ═══════════════ -->
<div id="main">
  <canvas id="hiero-canvas"></canvas>
  <div class="grid-overlay"></div>
  <div class="vignette"></div>

  <div id="node-stage">
    <svg id="string-svg"></svg>

    <!-- START (center) -->
    <button class="node-btn node-lg" id="start-node" onclick="activateStart()">
      <span class="node-glyph">&#x13080;</span><span>START</span>
    </button>

    <!-- Main 3 nodes -->
    <button class="node-btn node-md cyan-node" id="bio-node" onclick="openPanel('bio')">
      <span class="node-glyph">&#x13199;</span><span>BIO</span>
    </button>
    <button class="node-btn node-md cyan-node" id="msg-node" onclick="openPanel('msg')">
      <span class="node-glyph">&#x13191;</span><span>MSG</span>
    </button>
    <button class="node-btn node-md" id="socials-node" onclick="activateSocials()">
      <span class="node-glyph">&#x130FB;</span><span>SOCIALS</span>
    </button>

    <!-- Social sub-nodes -->

  <!-- ── PANEL ── -->
  <div id="panel-wrap">
    <div id="panel-backdrop" onclick="closePanel()"></div>
    <div id="panel">
      <div class="panel-header">
        <div class="panel-title-row">
          <svg viewBox="0 0 100 60" width="24" height="15">
            <ellipse cx="50" cy="30" rx="40" ry="20" fill="none" stroke="#ffd700" stroke-width="2"/>
            <circle cx="50" cy="30" r="10" fill="none" stroke="#ffd700" stroke-width="2"/>
            <circle cx="50" cy="30" r="4" fill="#ffd700"/>
            <line x1="10" y1="30" x2="0" y2="40" stroke="#ffd700" stroke-width="1.5"/>
            <line x1="90" y1="30" x2="100" y2="20" stroke="#ffd700" stroke-width="1.5"/>
          </svg>
          <span class="panel-title" id="panel-title">BIO</span>
        </div>
        <button class="panel-close" onclick="closePanel()">&#x2715;</button>
      </div>
      <div class="panel-body" id="panel-body"></div>
    </div>
  </div>
</div>

</body>
